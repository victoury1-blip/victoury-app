<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VICTOURY" />
    <title>VICTOURY - Gestion des Commandes</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force unregister all service workers and clear caches on ?clear-cache
      if (location.search.includes('clear-cache')) {
        (async () => {
          try {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
          } catch(e) {}
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
          } catch(e) {}
          location.replace(location.pathname);
        })();
      } else {
        // Auto-update: skip waiting on new SW
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg) {
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                if (newSW) newSW.addEventListener('statechange', () => {
                  if (newSW.state === 'activated') location.reload();
                });
              });
              reg.update();
            }
          });
        }
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
